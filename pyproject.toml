[project]
name = "yuubot"
version = "0.1.0"
description = "yuuagents enhanced QQ bot with IM/Web/Memory skills"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "click",
    "pyyaml",
    "tortoise-orm",
    "websockets",
    "fastapi",
    "uvicorn",
    "httpx",
    "apscheduler>=4.0.0a",
    "python-dotenv",
    "playwright",
    "trafilatura",
    "attrs",
    "msgspec",
    "yuuagents",
    "loguru>=0.7.3",
    "playwright-stealth>=2.0.2",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-asyncio",
    "pytest-cov",
]

[project.scripts]
ybot = "yuubot.cli:cli"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.metadata]
allow-direct-references = true

[tool.uv.sources]
yuuagents = { workspace = true }
yuullm = { workspace = true }
yuutrace = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/yuubot"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
markers = [
    "live: tests that require real external services/credentials",
]

[tool.ty.environment]
python = ".venv"
extra-paths = [
    "../yuuagents/src",
    "../yuullm/src",
    "../yuutrace/src",
    "../yuutools/src",
]

[tool.ty.src]
include = ["src"]

[tool.ty.rules]
unresolved-attribute = "warn"
invalid-argument-type = "warn"
invalid-assignment = "warn"
call-non-callable = "warn"
no-matching-overload = "warn"
call-top-callable = "warn"

[dependency-groups]
dev = [
    "respx>=0.22.0",
    "ruff>=0.15.5",
    "ty>=0.0.21",
]
