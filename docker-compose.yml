services:
  yuubot:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8765:8765"
    volumes:
      - yuubot-data:/data
      - ./docker_config.yaml:/config/config.yaml:ro
    environment:
      - YUU_DATA_DIR=/data
      - YUUBOT_PORT=8765
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8765/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  yuubot-data:
