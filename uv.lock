    { name = "click" },
    { name = "cryptography" },
    { name = "httpx" },
    { name = "matplotlib" },
    { name = "msgspec" },
    { name = "numpy" },
    { name = "pandas" },
    { name = "python-dotenv" },
    { name = "pyyaml" },
    { name = "starlette" },
    { name = "tortoise-orm" },
    { name = "uvicorn" },
    { name = "yuuagents" },
    { name = "yuutrace" },
]

