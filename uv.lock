    { name = "pyyaml" },
    { name = "starlette" },
    { name = "tortoise-orm" },
    { name = "uvicorn" },
    { name = "yuuagents", editable = "packages/yuuagents" },
    { name = "yuutrace", editable = "packages/yuutrace" },
]
