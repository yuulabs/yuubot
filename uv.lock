[package.metadata.requires-dev]
dev = [
    { name = "pytest", specifier = ">=9.0.2" },
    { name = "pytest-asyncio", specifier = ">=1.3.0" },
    { name = "ruff", specifier = ">=0.15.5" },
    { name = "ty", specifier = ">=0.0.21" },
]

