selectors:
- sonnet
- opus
- haiku
- gpt
- gemini-flash
- gemini-pro
- deepseek
- r1
capabilities:
  defaults: { vision: true, tool_use: true, reasoning: true, ctx: 1000000 }
  patterns:
    "deepseek-*": "-vision"
    "mistral-*": "-vision"
provider_priorities:
  aihubmix: 120
  deepseek: 110
  openrouter: 80
  anthropic: 70
provider_affinity:
  deepseek-*:
    deepseek: 100
  claude-*:
    anthropic: 80
  gemini-*:
    aihubmix: 30
llm_roles:
  vision: gemini-3.1-flash-lite-preview
  selector: deepseek-v4-flash:none
  summarizer: deepseek-v4-flash
agent_llm_refs:
  yuu: deepseek/deepseek-v4-flash:none
  maid: deepseek/deepseek-v4-pro:max
  general: deepseek/deepseek-v4-flash
  mem_curator: deepseek/deepseek-v4-flash
  ops: deepseek/deepseek-v4-flash
yuuagents:
  provider_aliases:
    or: openrouter
    ahm: aihubmix
    dpsk: deepseek
  providers:
    deepseek:
      api_type: openai-chat-completion
      api_key_env: DEEPSEEK_API_KEY
      default_model: deepseek-v4-flash
      base_url: https://api.deepseek.com/v1
    openrouter:
      api_type: openai-chat-completion
      api_key_env: OPENROUTER_API_KEY
      default_model: google/gemini-3.1-flash-lite-preview
      base_url: https://openrouter.ai/api/v1
    aihubmix:
      api_type: openai-chat-completion
      api_key_env: AIHUBMIX_API_KEY
      default_model: anthropic/claude-sonnet-4.1
      base_url: https://api.aihubmix.com/v1
    anthropic:
      api_type: anthropic-messages
      api_key_env: ANTHROPIC_API_KEY
