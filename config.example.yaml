# ============================================================
# yuubot 配置文件示例
# ============================================================

bot:
  qq: 123456789
  master: 987654321
  entries:
    - "/y"
    - "/yuu"

recorder:
  napcat_ws:
    host: "0.0.0.0"
    port: 8765
  relay_ws:
    host: "127.0.0.1"
    port: 8766
  api:
    host: "127.0.0.1"
    port: 8767
  napcat_http: "http://127.0.0.1:3000"
  napcat_webui_port: 6099

daemon:
  recorder_ws: "ws://127.0.0.1:8766"
  recorder_api: "http://127.0.0.1:8767"
  api:
    host: "127.0.0.1"
    port: 8780

database:
  path: "~/.yuubot/yuubot.db"

# LLM provider config (families, providers, roles, priorities, agent refs)
# lives in llm.yaml — see llm.example.yaml.

# yuuagents runtime settings (non-provider). Compiled into ~/.yagents/config.yaml.
# Agent entries are synthesized automatically from agent_llm_refs and characters.
yuuagents:
  db:
    url: "sqlite+aiosqlite:///~/.yagents/tasks.sqlite3"
  yuutrace:
    db_path: "~/.yagents/traces.db"
    ui_port: 8080
    server_port: 4318
  docker:
    image: "yuuagents-runtime:latest"
  tavily:
    api_key_env: "TAVILY_API_KEY"
  skills:
    paths:
      - "~/.yagents/skills"

api_keys:
  tavily: "${TAVILY_API_KEY}"

cron_jobs: []

schedule:
  max_long_cycle: 5
  tick_seconds: 1.0            # clock-drift check interval for wakeups
  late_grace_seconds: 2.0
  catchup_spacing_seconds: 10.0
  resume_threshold_seconds: 30.0

memory:
  forget_days: 90
  max_length: 500

web:
  browser_profile: "~/.yuubot/browser_profile"
  headless: true
  download_dir: "~/.yuubot/downloads"

response:
  group_default: "at"
  dm_whitelist: []

network:
  qq_direct: true   # NapCat runs without proxy env; yuubot direct-fetches QQ media

# Session: multi-turn conversation settings.
session:
  ttl: 300            # seconds before session expires (default 5 min)
  max_tokens: 60000   # single-turn token threshold for context rollover
  summarize_steps_span: 8
