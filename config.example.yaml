# Optional deployment listeners. Providers, integrations, actors, and routes are
# configured from the Admin UI and persisted in data_dir/db/yuubot.db. Runtime
# logs are written under data_dir/logs/.
#
# local_admin_server:
#   enabled: true
#   host: 127.0.0.1
#   port: 8765
#   url_base: http://127.0.0.1:8765
#
# public_server:
#   enabled: false
#   host: 0.0.0.0
#   port: 8766
#   url_base: https://public.example.com
#
# Public app webhooks require HMAC when public_server is enabled. Configure the
# per-integration secret in the environment and send X-Yuubot-Webhook-Signature:
#   YUUBOT_GITHUB_WEBHOOK_SECRET=...
#   YUUBOT_CODEX_WEBHOOK_SECRET=...
#   YUUBOT_OPENCODE_WEBHOOK_SECRET=...
#   YUUBOT_TAVILY_WEB_WEBHOOK_SECRET=...
#
# trusted_admin_server:
#   enabled: false
#   host: 127.0.0.1
#   port: 8767
#   url_base: https://admin.example.com
#   auth:
#     mode: builtin
#     builtin:
#       session_cookie_name: yuubot_session
#       csrf_header: X-CSRF-Token
#       username: admin
#       password: change-me
#
# trusted_proxies: [127.0.0.1]
