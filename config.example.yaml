data_dir: ~/.yuubot-data
# Layout under data_dir:
#   workspace/{actor_id}/  actor workspaces and execute_python cwd
#   db/yuubot.db           SQLite persistence
#   logs/                  daemon logs
#   tmp/                   tool and kernel temp files
#   kv/                    actor key-value store
#   published/             public share snapshots

# python_kernels:
#   max_workers: 4
#   acquire_timeout_s: 30
#   max_rss_bytes: 2147483648
#   idle_ttl_s: 21600
#   max_output_bytes: 262144
#   execution_timeout_s: 120

# resources:
