# yuubot v2 Docker bootstrap config.
#
# Only startup-level settings belong here. Runtime resources (LLM providers,
# characters, actors, channels, routes) are managed through the Admin UI.
#
# Mount this file at /config/config.yaml in the container.

admin:
  host: 0.0.0.0
  port: 8781
  secret: ${YUU_ADMIN_SECRET}
  web_dist_dir: /opt/yuubot-src/admin-web/dist

server:
  daemon_host: 0.0.0.0
  daemon_port: 8780
  daemon_secret: ${YUU_DAEMON_SECRET}

database:
  path: ${YUU_DATA_DIR}/yuubot/yuubot.db

secrets:
  master_key: ${YUU_SECRET_KEY}

trace:
  enabled: true
  collector_host: 127.0.0.1
  collector_port: 4318
  ui_host: 127.0.0.1
  ui_port: 8782

paths:
  data_dir: ${YUU_DATA_DIR}

yuuagents:
  strict: false
  tool_backends:
    background: {}
    schedule:
      db_path: ${YUU_DATA_DIR}/yuubot/schedule.sqlite3