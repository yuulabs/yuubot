<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>yuubot admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #f0fdfa;
      --bg2:      #ccfbf1;
      --bg3:      #99f6e4;
      --border:   #99f6e4;
      --text:     #134e4a;
      --text2:    #0f766e;
      --text3:    #6b7280;
      --accent:   #0d9488;
      --accent2:  #2dd4bf;
      --danger:   #ef4444;
      --user-bg:  #0d9488;
      --user-fg:  #fff;
      --bot-bg:   #fff;
      --bot-fg:   #134e4a;
      --shadow:   0 1px 4px rgba(13,148,136,.10);
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; }
    body { display: flex; flex-direction: column; }

    /* ── Auth overlay ── */
    #auth-overlay {
      position: fixed; inset: 0; background: rgba(240,253,250,.92);
      display: flex; align-items: center; justify-content: center; z-index: 100;
    }
    #auth-overlay.hidden { display: none; }
    .auth-card {
      background: #fff; border: 1px solid var(--border); border-radius: 16px;
      padding: 32px 28px; width: 320px; box-shadow: var(--shadow);
      display: flex; flex-direction: column; gap: 14px;
    }
    .auth-card h2 { font-size: 18px; color: var(--text); text-align: center; }
    .auth-card input {
      width: 100%; padding: 9px 12px; border: 1px solid var(--border);
      border-radius: 8px; font-size: 14px; color: var(--text);
      background: var(--bg); outline: none;
    }
    .auth-card input:focus { border-color: var(--accent); }
    .auth-card button {
      width: 100%; padding: 9px; background: var(--accent); color: #fff;
      border: none; border-radius: 8px; font-size: 14px; cursor: pointer;
    }
    .auth-card button:hover { background: var(--text2); }
    #auth-error { color: var(--danger); font-size: 12px; text-align: center; min-height: 16px; }

    /* ── Header ── */
    header {
      display: flex; align-items: center; gap: 8px;
      padding: 0 16px; height: 48px; min-height: 48px;
      background: #fff; border-bottom: 1px solid var(--border);
      flex-shrink: 0; box-shadow: var(--shadow);
    }
    header h1 { font-size: 15px; font-weight: 700; color: var(--accent); letter-spacing: .3px; margin-right: 8px; }
    .tab-btn {
      padding: 5px 14px; font-size: 13px; font-weight: 500;
      background: transparent; color: var(--text3); border: none;
      border-radius: 20px; cursor: pointer; transition: background .15s, color .15s;
    }
    .tab-btn:hover { background: var(--bg2); color: var(--text); }
    .tab-btn.active { background: var(--accent2); color: var(--text); }
    .hdr-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--accent2);
      transition: background .3s;
    }
    .status-dot.offline { background: var(--danger); }
    .status-dot.connecting { background: #f59e0b; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    #status-text { font-size: 12px; color: var(--text3); }
    .logout-btn {
      padding: 4px 10px; font-size: 12px; background: var(--bg2);
      color: var(--text2); border: 1px solid var(--border); border-radius: 6px; cursor: pointer;
    }
    .logout-btn:hover { background: var(--bg3); }

    /* ── Tab panels ── */
    #main { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
    .tab-panel { display: none; flex: 1; overflow: hidden; }
    .tab-panel.active { display: flex; flex-direction: column; }

    /* ── Chat ── */
    #chat-panel { flex-direction: column; }
    #chat-messages {
      flex: 1; overflow-y: auto; padding: 20px 0;
      display: flex; flex-direction: column; gap: 12px;
    }
    .msg-row { display: flex; padding: 0 20px; }
    .msg-row.user { justify-content: flex-end; }
    .msg-row.assistant { justify-content: flex-start; }
    .msg-bubble {
      max-width: 72%; padding: 10px 14px; border-radius: 16px;
      line-height: 1.6; word-break: break-word;
      box-shadow: var(--shadow);
    }
    .msg-row.user .msg-bubble { background: var(--user-bg); color: var(--user-fg); border-bottom-right-radius: 4px; }
    .msg-row.assistant .msg-bubble { background: var(--bot-bg); color: var(--bot-fg); border-bottom-left-radius: 4px; border: 1px solid var(--border); }
    .msg-bubble p { margin: 0 0 6px; }
    .msg-bubble p:last-child { margin-bottom: 0; }
    .msg-bubble pre { background: var(--bg2); border-radius: 8px; padding: 10px 12px; overflow-x: auto; font-size: 12px; margin: 6px 0; }
    .msg-bubble code { font-family: "JetBrains Mono", "Fira Code", monospace; font-size: 12px; }
    .msg-bubble :not(pre) > code { background: var(--bg2); padding: 1px 5px; border-radius: 4px; }
    .msg-bubble table { border-collapse: collapse; width: 100%; margin: 6px 0; font-size: 12px; }
    .msg-bubble th, .msg-bubble td { border: 1px solid var(--border); padding: 4px 8px; }
    .msg-bubble th { background: var(--bg2); }
    .msg-bubble blockquote { border-left: 3px solid var(--accent2); padding-left: 10px; color: var(--text2); margin: 6px 0; }
    .thinking-bubble { color: var(--text3); font-style: italic; font-size: 13px; }
    #chat-input-area {
      border-top: 1px solid var(--border); padding: 12px 20px;
      background: #fff; display: flex; gap: 10px; align-items: flex-end;
    }
    #chat-input {
      flex: 1; resize: none; padding: 10px 12px; border: 1px solid var(--border);
      border-radius: 12px; font-size: 14px; font-family: inherit; color: var(--text);
      background: var(--bg); outline: none; max-height: 160px; min-height: 42px;
      line-height: 1.5;
    }
    #chat-input:focus { border-color: var(--accent); }
    #chat-send {
      padding: 10px 18px; background: var(--accent); color: #fff;
      border: none; border-radius: 12px; font-size: 14px; cursor: pointer;
      flex-shrink: 0; align-self: flex-end;
    }
    #chat-send:hover { background: var(--text2); }
    #chat-send:disabled { background: var(--bg3); color: var(--text3); cursor: default; }

    /* ── Config ── */
    #config-panel { overflow-y: auto; padding: 24px; gap: 20px; flex-direction: column; }
    .cfg-section {
      background: #fff; border: 1px solid var(--border); border-radius: 12px;
      padding: 18px 20px; display: flex; flex-direction: column; gap: 12px;
      box-shadow: var(--shadow);
    }
    .cfg-section h3 { font-size: 13px; font-weight: 600; color: var(--accent); text-transform: uppercase; letter-spacing: .5px; }
    .cfg-row { display: flex; align-items: center; gap: 12px; }
    .cfg-label { width: 200px; flex-shrink: 0; font-size: 13px; color: var(--text2); }
    .cfg-val {
      flex: 1; padding: 6px 10px; border: 1px solid var(--border);
      border-radius: 8px; font-size: 13px; font-family: monospace;
      color: var(--text); background: var(--bg); outline: none;
    }
    .cfg-val:focus { border-color: var(--accent); }
    .cfg-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 4px; }
    .cfg-save {
      padding: 7px 20px; background: var(--accent); color: #fff;
      border: none; border-radius: 8px; font-size: 13px; cursor: pointer;
    }
    .cfg-save:hover { background: var(--text2); }
    #cfg-status { font-size: 12px; color: var(--text3); }

    /* ── Monitor ── */
    #monitor-panel { flex-direction: row; }
    #monitor-frame { flex: 1; border: none; }

    /* ── Terminal ── */
    #terminal-panel { flex-direction: row; }
    #term-wrap { flex: 1; padding: 6px; overflow: hidden; display: flex; }
    #terminal { flex: 1; min-height: 0; }
    .xterm { height: 100%; }
    .xterm-viewport { overflow-y: auto !important; }
  </style>
</head>
<body>

<!-- Auth overlay -->
<div id="auth-overlay" class="hidden">
  <div class="auth-card">
    <h2>yuubot admin</h2>
    <input type="password" id="auth-input" placeholder="Password" autocomplete="current-password">
    <div id="auth-error"></div>
    <button onclick="doLogin()">Login</button>
  </div>
</div>

<header>
  <h1>yuubot</h1>
  <button class="tab-btn active" onclick="switchTab('chat')">Chat</button>
  <button class="tab-btn" onclick="switchTab('config')">Config</button>
  <button class="tab-btn" onclick="switchTab('monitor')">Monitor</button>
  <button class="tab-btn" onclick="switchTab('terminal')">Terminal</button>
  <div class="hdr-right">
    <span id="status-text">—</span>
    <div id="status-dot" class="status-dot offline"></div>
    <button class="logout-btn" onclick="doLogout()">Logout</button>
  </div>
</header>

<div id="main">
  <!-- Chat -->
  <div id="tab-chat" class="tab-panel active">
    <div id="chat-messages"></div>
    <div id="chat-input-area">
      <textarea id="chat-input" rows="1" placeholder="Message… (Ctrl+Enter to send)"></textarea>
      <button id="chat-send" onclick="sendChat()">Send</button>
    </div>
  </div>

  <!-- Config -->
  <div id="tab-config" class="tab-panel">
    <div id="config-panel" class="tab-panel active" style="display:flex">
      <div id="cfg-sections"></div>
      <div class="cfg-actions">
        <span id="cfg-status"></span>
        <button class="cfg-save" onclick="saveConfig()">Save</button>
      </div>
    </div>
  </div>

  <!-- Monitor -->
  <div id="tab-monitor" class="tab-panel">
    <iframe id="monitor-frame" src="about:blank"></iframe>
  </div>

  <!-- Terminal -->
  <div id="tab-terminal" class="tab-panel">
    <div id="term-wrap">
      <div id="terminal"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<script>
// ── Auth ─────────────────────────────────────────────────────────────────────
async function checkAuth() {
  const r = await fetch('/auth/check').catch(() => null);
  if (!r || r.status === 401) {
    document.getElementById('auth-overlay').classList.remove('hidden');
  } else {
    document.getElementById('auth-overlay').classList.add('hidden');
    onAuthed();
  }
}

async function doLogin() {
  const secret = document.getElementById('auth-input').value;
  const r = await fetch('/auth/login', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({secret}),
  });
  if (r.ok) {
    document.getElementById('auth-overlay').classList.add('hidden');
    document.getElementById('auth-error').textContent = '';
    onAuthed();
  } else {
    document.getElementById('auth-error').textContent = 'Wrong password.';
  }
}

document.getElementById('auth-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

async function doLogout() {
  await fetch('/auth/logout', {method:'POST'});
  location.reload();
}

// ── Tab switching ─────────────────────────────────────────────────────────────
let currentTab = 'chat';
let adminSettingsPromise = null;

async function loadAdminSettings() {
  if (!adminSettingsPromise) {
    adminSettingsPromise = fetch('/api/admin/settings')
      .then(r => r.ok ? r.json() : {})
      .catch(() => ({}));
  }
  return adminSettingsPromise;
}

function monitorUrl(settings) {
  const configured = String(settings.monitor_url || '').trim();
  if (configured) return configured;
  const port = Number(settings.monitor_port || 8782);
  return location.protocol + '//' + location.hostname + ':' + port;
}

async function openMonitor() {
  const frame = document.getElementById('monitor-frame');
  if (frame.src !== 'about:blank') return;
  frame.src = monitorUrl(await loadAdminSettings());
}

async function switchTab(name) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(b => {
    if (b.textContent.toLowerCase() === name) b.classList.add('active');
  });
  currentTab = name;
  if (name === 'terminal') { termFit && termFit.fit(); sendResize(); }
  if (name === 'monitor') await openMonitor();
}

// ── Chat ─────────────────────────────────────────────────────────────────────
let chatWs = null;
let chatBusy = false;

function connectChat() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const token = document.cookie.match(/yuu_admin_session=([^;]+)/)?.[1] || '';
  chatWs = new WebSocket(proto + '//' + location.host + '/chat/ws' + (token ? '?token=' + token : ''));
  chatWs.onopen = () => setStatus('open');
  chatWs.onclose = () => { setStatus('offline'); chatWs = null; };
  chatWs.onerror = () => setStatus('offline');
  chatWs.onmessage = e => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'thinking') {
      appendThinking();
    } else if (msg.type === 'message') {
      removeThinking();
      appendMessage('assistant', msg.text);
      chatBusy = false;
      document.getElementById('chat-send').disabled = false;
    }
  };
}

function setStatus(state) {
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-text');
  dot.className = 'status-dot' + (state === 'open' ? '' : state === 'connecting' ? ' connecting' : ' offline');
  txt.textContent = state === 'open' ? 'connected' : state === 'connecting' ? 'connecting…' : 'offline';
}

function renderMarkdown(text) {
  const html = marked.parse(text, {breaks: true, gfm: true});
  const div = document.createElement('div');
  div.innerHTML = html;
  renderMathInElement(div, {
    delimiters: [
      {left:'$$', right:'$$', display:true},
      {left:'$', right:'$', display:false},
      {left:'\\(', right:'\\)', display:false},
      {left:'\\[', right:'\\]', display:true},
    ],
    throwOnError: false,
  });
  return div;
}

function appendMessage(role, text) {
  const msgs = document.getElementById('chat-messages');
  const row = document.createElement('div');
  row.className = 'msg-row ' + role;
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  if (role === 'assistant') {
    bubble.appendChild(renderMarkdown(text));
  } else {
    bubble.textContent = text;
  }
  row.appendChild(bubble);
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

let thinkingEl = null;
function appendThinking() {
  if (thinkingEl) return;
  const msgs = document.getElementById('chat-messages');
  const row = document.createElement('div');
  row.className = 'msg-row assistant';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble thinking-bubble';
  bubble.textContent = 'thinking…';
  row.appendChild(bubble);
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
  thinkingEl = row;
}
function removeThinking() {
  if (thinkingEl) { thinkingEl.remove(); thinkingEl = null; }
}

function sendChat() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text || chatBusy || !chatWs || chatWs.readyState !== WebSocket.OPEN) return;
  appendMessage('user', text);
  input.value = '';
  input.style.height = '';
  chatBusy = true;
  document.getElementById('chat-send').disabled = true;
  chatWs.send(JSON.stringify({type: 'message', text}));
}

document.getElementById('chat-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.ctrlKey) { e.preventDefault(); sendChat(); }
});

// Auto-resize textarea
document.getElementById('chat-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 160) + 'px';
});

// ── Config ────────────────────────────────────────────────────────────────────
const CFG_GROUPS = {
  'Response': ['response.group_default', 'response.dm_whitelist'],
  'Memory':   ['memory.forget_days', 'memory.max_length'],
  'Session':  ['session.summarize_steps_span'],
  'Bot':      ['bot.entries'],
  'LLM':      ['agent_llm_refs'],
};

let cfgData = {};
const cfgInputs = {};

async function loadConfig() {
  const r = await fetch('/api/config');
  if (!r.ok) return;
  cfgData = await r.json();
  renderConfig();
}

function renderConfig() {
  const container = document.getElementById('cfg-sections');
  container.innerHTML = '';
  for (const [group, keys] of Object.entries(CFG_GROUPS)) {
    const sec = document.createElement('div');
    sec.className = 'cfg-section';
    const h = document.createElement('h3');
    h.textContent = group;
    sec.appendChild(h);
    for (const key of keys) {
      const val = cfgData[key];
      if (val === undefined) continue;
      const row = document.createElement('div');
      row.className = 'cfg-row';
      const label = document.createElement('span');
      label.className = 'cfg-label';
      label.textContent = key.split('.').pop();
      label.title = key;
      const input = document.createElement('input');
      input.className = 'cfg-val';
      input.value = typeof val === 'object' ? JSON.stringify(val) : String(val);
      input.dataset.key = key;
      cfgInputs[key] = input;
      row.appendChild(label);
      row.appendChild(input);
      sec.appendChild(row);
    }
    container.appendChild(sec);
  }
}

async function saveConfig() {
  const patch = {};
  for (const [key, input] of Object.entries(cfgInputs)) {
    const raw = input.value.trim();
    const orig = cfgData[key];
    let val;
    try {
      val = JSON.parse(raw);
    } catch {
      val = raw;
    }
    patch[key] = val;
  }
  const r = await fetch('/api/config', {
    method: 'PATCH', headers: {'Content-Type':'application/json'},
    body: JSON.stringify(patch),
  });
  const result = await r.json();
  const status = document.getElementById('cfg-status');
  const errKeys = Object.keys(result.errors || {});
  if (errKeys.length) {
    status.textContent = 'Errors: ' + errKeys.join(', ');
    status.style.color = 'var(--danger)';
  } else {
    status.textContent = 'Saved.';
    status.style.color = 'var(--accent)';
    cfgData = {...cfgData, ...result.applied};
  }
  setTimeout(() => { status.textContent = ''; }, 3000);
}

// ── Terminal ──────────────────────────────────────────────────────────────────
const term = new Terminal({
  cursorBlink: true, scrollback: 5000,
  theme: {
    background: '#f0fdfa', foreground: '#134e4a',
    cursor: '#0d9488', cursorAccent: '#f0fdfa',
    selection: 'rgba(13,148,136,.2)',
    black: '#6b7280', red: '#ef4444', green: '#059669',
    yellow: '#d97706', blue: '#0d9488', magenta: '#7c3aed',
    cyan: '#0891b2', white: '#374151',
    brightBlack: '#9ca3af', brightRed: '#f87171', brightGreen: '#34d399',
    brightYellow: '#fbbf24', brightBlue: '#2dd4bf', brightMagenta: '#a78bfa',
    brightCyan: '#22d3ee', brightWhite: '#f9fafb',
  },
  allowProposedApi: true,
});
const termFit = new FitAddon.FitAddon();
term.loadAddon(termFit);
term.open(document.getElementById('terminal'));

const enc = new TextEncoder();
let termWs = null;

function sendResize() {
  if (termWs && termWs.readyState === WebSocket.OPEN)
    termWs.send(JSON.stringify({type:'resize', cols:term.cols, rows:term.rows}));
}

function connectTerminal() {
  if (termWs) return;
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  termWs = new WebSocket(proto + '//' + location.host + '/terminal/ws');
  termWs.binaryType = 'arraybuffer';
  termWs.onopen = () => { termFit.fit(); sendResize(); };
  termWs.onmessage = e => term.write(e.data instanceof ArrayBuffer ? new Uint8Array(e.data) : e.data);
  termWs.onclose = () => { termWs = null; term.write('\r\n\x1b[2m[disconnected]\x1b[0m\r\n'); };
}

term.onData(d => { if (termWs && termWs.readyState === WebSocket.OPEN) termWs.send(enc.encode(d)); });
term.onSelectionChange(() => {
  const s = term.getSelection();
  if (s && navigator.clipboard) navigator.clipboard.writeText(s).catch(() => {});
});
term.attachCustomKeyEventHandler(e => {
  if (e.type === 'keydown' && e.ctrlKey && (e.key === 'v' || e.key === 'V')) {
    navigator.clipboard?.readText().then(t => {
      if (termWs && termWs.readyState === WebSocket.OPEN && t) termWs.send(enc.encode(t));
    }).catch(() => {});
    return false;
  }
  return true;
});

new ResizeObserver(() => { if (currentTab === 'terminal') { termFit.fit(); sendResize(); } })
  .observe(document.getElementById('term-wrap'));

// ── Init ──────────────────────────────────────────────────────────────────────
function onAuthed() {
  connectChat();
  loadConfig();
  connectTerminal();
}

checkAuth();
</script>
</body>
</html>
