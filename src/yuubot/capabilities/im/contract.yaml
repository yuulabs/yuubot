name: im
summary: 真实 QQ 对话的收发、搜索、浏览与表情回应
actions:
  - name: send
    summary: 把一条或多条消息真实发送到指定 QQ 会话
    usage: |
      `im send` 不是写草稿，而是把消息真实发到 QQ。
      发出去后，对方会立刻看到；这些消息也会进入后续对话历史。

      # 发消息（统一信封格式）
      im send --ctx <ctx_id> -- [
        {"msg": [{"type":"text","data":{"text":"第一段"}}], "gap": 0},
        {"msg": [{"type":"text","data":{"text":"第二段"}}], "gap": 2.0}
      ]
      # 每个 {"msg": [...], "gap": N} 是一条独立消息。
      # gap 单位为秒，表示发这条消息前等待的时间，用来模拟打字节奏。
      # 只发一条时也用这个格式，gap 设 0 即可。
      # 返回发完时的剩余额度。每分钟至多5条，不要spam消息。

      # 戳一戳（poke）— 戳群里某个人
      im send --ctx <ctx_id> -- [
        {"msg": [{"type":"poke","data":{"qq":"目标QQ号"}}], "gap": 0}
      ]
    payload_rule: "JSON array: [{msg, gap}, ...]"
    return_shape: text
  - name: search
    summary: 关键词全文搜索消息
    usage: im search "<keywords>" --ctx <ctx_id> --limit 20 --days 7
    payload_rule: none
    return_shape: text
  - name: browse
    summary: 按 msg_id 或时间范围浏览消息上下文，支持按用户过滤
    usage: |
      im browse --msg <msg_id> --before 10 --after 10
      im browse --ctx <ctx_id> --since 2024-01-01 --until 2024-01-02
      im browse --ctx <ctx_id> --qq 123456,789012
      im browse --ctx <ctx_id> --name "alice"
      # --qq: 按 QQ 号过滤（逗号分隔多个）
      # --name: 按昵称/群名片子串匹配
      # 两个过滤条件为 OR 关系：满足任一即保留
    payload_rule: none
    return_shape: text
  - name: recent
    summary: 查看当前 ctx 中某条消息之后的最近真实消息
    usage: |
      im recent --ctx <ctx_id> --limit 50
      im recent --ctx <ctx_id> --after-msg <msg_id> --limit 50
      # 默认返回当前 ctx 最新的 N 条消息
      # 指定 --after-msg 时，返回这条消息之后的新消息
    payload_rule: none
    return_shape: text
  - name: react
    summary: 对消息贴表情回应（emoji reaction）
    usage: |
      im react --msg <msg_id> --emoji <name>
      # 可用表情: thumbsup, heart, laugh, cry, cool, doge, cute, ok,
      #   rose, fire, clap, hug, think, salute, respect, celebrate,
      #   angry, question, press_button
      # question: 用于“神秘”“不知所云”“太怪了”，是带气氛感的问号，不是普通提问
      # press_button: 动态“按按钮”，用于“太对了”“我要按这个”，也可用于极度难绷
      # 兼容旧名: button
    payload_rule: none
    return_shape: text
  - name: read
    summary: 读取 QQ 卡片内容；当前支持合并转发
    usage: im read --forward-msg <forward_id>
    payload_rule: none
    return_shape: text
  - name: list
    summary: 列出好友/群/成员/ctx
    usage: im list friends|groups|members|contexts [--gid <group_id>]
    payload_rule: none
    return_shape: text
