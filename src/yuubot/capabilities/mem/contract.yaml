name: mem
summary: 记忆存储、检索与自动遗忘
actions:
  - name: save
    summary: 保存一条记忆
    usage: mem save "<content>" --tags <tag1>,<tag2> --scope private|public --recall-terms <term1>,<term2>
    payload_rule: none
    return_shape: text
    notes: |
      recall-terms 是语义触发词，用于增强记忆召回。当消息文本中出现这些词时，
      即使分词器会过滤它们，记忆也能被命中。适用于：
      - 短词/缩写/昵称（如 "小n", "pn"）——会被分词器当 stop word 过滤
      - 句式梗的触发片段（如 "常年" + "的人"）——单独出现时太常见，但组合有特殊含义
      - 在特定群有特殊含义的常见词
      只在"意外性"高的情况下使用，不要为普通记忆添加。
  - name: recall
    summary: 按关键词/标签检索记忆
    usage: mem recall "<words>" --tags "<tags>" --limit 10
    payload_rule: none
    return_shape: text
  - name: delete
    summary: 将记忆移入垃圾桶（仅 mem_curator 或 CLI 可调用）
    usage: mem delete <id1>,<id2>,...
    payload_rule: none
    return_shape: text
    notes: 软删除，可用 mem restore 回滚；forget 周期到期后自动永久删除
  - name: restore
    summary: 从垃圾桶恢复记忆（仅 mem_curator 或 CLI 可调用）
    usage: mem restore <id1>,<id2>,...
    payload_rule: none
    return_shape: text
  - name: show
    summary: 查看记忆标签列表
    usage: mem show --tags
    payload_rule: none
    return_shape: text
  - name: config
    summary: 配置记忆系统参数
    usage: mem config --forget-days <days>
    payload_rule: none
    return_shape: text
