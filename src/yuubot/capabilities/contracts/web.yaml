name: web
summary: 网页搜索、阅读与下载
actions:
  - name: search
    summary: Tavily 搜索引擎查询
    usage: web search "<query>" --limit 5
    payload_rule: none
    return_shape: text
  - name: read
    summary: 提取网页正文内容
    usage: web read "<url>" --summary
    payload_rule: none
    return_shape: text
  - name: download
    summary: 下载文件到本地
    usage: web download "<url1>" "<url2>" <folder>
    payload_rule: none
    return_shape: text
