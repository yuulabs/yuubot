[project]
name = "yuuagents"
version = "0.2.0"
description = "Agent runtime rebuilt around Engine, Thread, and Executor"
readme = "README.md"
license = "MIT"
license-files = ["LICENSE"]
authors = [
    { name = "Tomorrowdawn", email = "tomorrowdawn@mail.ustc.edu.cn" }
]
requires-python = ">=3.14"
keywords = ["agents", "llm", "runtime", "sdk"]
classifiers = [
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.14",
    "Intended Audience :: Developers",
    "Topic :: Software Development :: Libraries",
]
dependencies = [
    "yuutools>=0.1.0",
    "yuullm>=0.7.0",
    "yuutrace>=0.3.0",
    "attrs>=24.2.0",
    "ipykernel>=7.0.0",
    "jupyter-client>=8.6.0",
    "msgspec>=0.19.0",
    "croniter>=6.2.2",
    "aiosqlite>=0.20.0",
]

[build-system]
requires = ["uv_build>=0.9.13,<0.10.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "mypy>=1.19.1",
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
    "ruff>=0.15.0",
    "types-pyyaml>=6.0.12.20250915",
]
examples = [
    "rich>=13.0.0",
]

[tool.mypy]
python_version = "3.14"

[tool.uv.sources]
yuullm = { workspace = true }
yuutools = { workspace = true }
yuutrace = { workspace = true }
