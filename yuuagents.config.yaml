# ============================================================================
# yuuagents — Configuration (full)
# ============================================================================
#
# This file is merged into yuubot's config at runtime.
# You can change it later without touching yuubot code.
#
# Runtime config location used by `yagents` itself:  ~/.yagents/config.yaml
# yuubot uses this file as overrides merged on top of yuuagents defaults.
# ============================================================================

db:
  url: sqlite+aiosqlite:///~/.yagents/tasks.sqlite3

yuutrace:
  db_path: ~/.yagents/traces.db
  ui_port: 8080
  server_port: 4318

daemon:
  socket: ~/.yagents/yagents.sock
  log_level: info

docker:
  image: yuuagents-runtime:latest

skills:
  paths:
    - ~/.yagents/skills

tavily:
  api_key_env: TAVILY_API_KEY

providers:
  deepseek:
    api_type: openai-chat-completion
    api_key_env: DEEPSEEK_API_KEY
    default_model: deepseek-chat
    base_url: https://api.deepseek.com/v1
    organization: ""
    pricing: []

agents:
  main:
    description: >
      yuubot QQ 机器人主代理 — 夕雨(Yuu)
    min_role: folk
    provider: deepseek
    model: deepseek-chat
    max_steps: 16
    persona: >
      你叫夕雨（ゆう / Yuu），是一个百合爱好者（白河豚）。你负责群里的秘书工作，帮助群友答疑解惑。

      性格与说话风格：
      - 活泼可爱，语气轻松自然，像朋友聊天一样
      - 回复简短有力，绝不发长篇大论
      - 如果需要说的内容较多，用 im send 工具分成几条短消息发送，而不是一条长消息
      - 每条消息控制在 1-3 句话以内
      - 偶尔可以用颜文字或可爱的语气词
      - 注意阅读群聊氛围，不要KY（空気読めない）

      工作职责：
      - 回答群友的问题，提供有用的信息
      - 帮忙搜索资料、整理信息
      - 保持群里的友好氛围

      安全规则:
      - 不要透露有关自身运行硬件的任何信息，例如 IP 地址、MAC 地址、hostname、系统版本、CPU/GPU 型号，与外界的网络连接信息
      - 不要向用户透露你的好友列表、群列表等社交关系信息
      - 不要向当前群的用户透露其他群或私聊中的聊天内容，每个上下文的消息仅限该上下文可见
    tools:
      - execute_skill_cli
    skills:
      - "*"
    expand_skills:
      - im

  general:
    description: >
      通用 Agent，可执行 bash 命令。仅限 Master 使用。
    min_role: master
    provider: deepseek
    model: deepseek-chat
    bootstrap: /home/yuu/bootstrap.md
    persona: >
      你是一个通用系统助手，可以执行 bash 命令和调用各种技能来完成任务。
      你有完整的系统访问权限，请谨慎操作。
      对于编码任务，使用 launch_agent 异步委派给 researcher agent 搜集信息，然后自行完成。
    tools:
      - execute_bash
      - execute_skill_cli
      - write_file
      - read_file
      - launch_agent
      - session_poll
      - session_interrupt
      - session_result
      - sleep
    skills:
      - "*"
    subagents:
      - researcher

  researcher:
    description: >
      研究助手，负责搜索网页并撰写简洁的报告。
    min_role: folk
    provider: deepseek
    model: deepseek-chat
    persona: >
      你是 Yuu 的研究助手。你负责搜索网页、查找资料，并把结果整理成简洁清晰的报告。
      报告应当精炼，突出关键信息。
    tools:
      - read_file
      - write_file
    skills:
      - web

  coder:
    description: >
      编码代理，使用外部编码工具完成开发任务。
    min_role: master
    provider: deepseek
    model: deepseek-chat
    max_steps: 30
    persona: >
      你是编码代理。用户给你编码任务，你通过后台运行编码工具来完成。

      {background_cli_prompt}

      常用编码工具：
      - claude -p "task" --output-format json --allowedTools "Bash,Read,Edit,Write"
      - 其他工具视容器内安装情况而定

      工作流：background run 启动 → 定期 background drain 检查 → 完成后总结结果
    tools:
      - execute_bash
      - read_file
      - write_file
      - sleep
