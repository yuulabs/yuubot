# ============================================================================
# yuuagents — Configuration
# ============================================================================
#
# Agent behavior (persona, tools, skills, sections) lives in
# src/yuubot/characters.py — the single source of truth.
#
# This file only configures infrastructure: providers, models, and
# which provider/model each agent uses. Hot-reloadable on new sessions.
# ============================================================================

db:
  url: sqlite+aiosqlite:///~/.yagents/tasks.sqlite3

yuutrace:
  db_path: ~/.yagents/traces.db
  ui_port: 8080
  server_port: 4318

daemon:
  socket: ~/.yagents/yagents.sock
  log_level: info

docker:
  image: yuuagents-runtime:latest

skills:
  paths:
    - ~/.yagents/skills

tavily:
  api_key_env: TAVILY_API_KEY

providers:
  deepseek:
    api_type: openai-chat-completion
    api_key_env: DEEPSEEK_API_KEY
    default_model: deepseek-chat
    base_url: https://api.deepseek.com/v1
    organization: ""
    pricing: []
    models:
      deepseek-chat:
        vision: false
  openrouter:
    api_type: openai-chat-completion
    api_key_env: OPENROUTER_API_KEY
    default_model: google/gemini-3.1-flash-lite-preview
    base_url: https://openrouter.ai/api/v1
    organization: ""
    pricing: []
    models:
      google/gemini-3.1-flash-lite-preview:
        vision: true
      openai/gpt-5.4:
        vision: true
      anthropic/claude-sonnet-4.6:
        vision: true
      google/gemini-3-flash-preview:
        vision: true
      google/gemini-3.1-pro-preview-customtools:
        vision: true
      x-ai/grok-4.1-fast:
        vision: false

# Only provider + model per agent. All behavior is in characters.py.
agents:
  main:
    provider: deepseek
    model: deepseek-chat
  general:
    provider: deepseek
    model: deepseek-chat
  researcher:
    provider: deepseek
    model: deepseek-chat
  coder:
    provider: deepseek
    model: deepseek-chat
  mem_curator:
    provider: deepseek
    model: deepseek-chat
