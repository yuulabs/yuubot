services:
  yuubot:
    build:
      context: ..
      dockerfile: yuubot-v2/Dockerfile
    ports:
      - "8780:8780"  # daemon API
      - "8781:8781"  # admin UI
    volumes:
      - yuubot-data:/data
      - ./docker_config.yaml:/config/config.yaml:ro
    environment:
      - YUU_DATA_DIR=/data
      - YUU_SECRET_KEY=${YUU_SECRET_KEY}
      - YUU_ADMIN_SECRET=${YUU_ADMIN_SECRET}
      - YUU_DAEMON_SECRET=${YUU_DAEMON_SECRET}

volumes:
  yuubot-data: